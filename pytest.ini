[pytest]
# Run tests directly against the source tree (the package is normally used from
# a clone, see README "Option 2"). No install step needed.
pythonpath = .
testpaths = tests
addopts = -ra
filterwarnings =
    # matplotlib emits this from the headless results-manager figures; not relevant to tests.
    ignore:This figure includes Axes that are not compatible with tight_layout:UserWarning
